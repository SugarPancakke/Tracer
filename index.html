<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Simplifier</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <h1>PNG Simplifier</h1>

    <div class="controls">

        <input
            type="file"
            id="files"
            multiple
            accept="image/png"
        >

        <label>
            Colors:
            <span id="colorsValue">6</span>
        </label>

        <input
            type="range"
            id="colors"
            min="2"
            max="16"
            value="6"
        >

        <label>
            Detail:
            <span id="detailValue">32</span>
        </label>

        <input
            type="range"
            id="detail"
            min="8"
            max="128"
            value="32"
            step="4"
        >

        <button id="downloadAll">
            Download All PNGs
        </button>

    </div>

    <div id="gallery"></div>

    <script src="script.js"></script>

</body>
</html>
