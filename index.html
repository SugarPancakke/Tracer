<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PNG Shape Simplifier</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="wrapper">

    <div class="title">
        PNG Shape Simplifier
    </div>

    <div class="subtitle">
        Convert transparent PNGs into silhouettes or pixelated silhouettes.
    </div>

    <label class="upload-label">
        Upload PNGs:
        <input
            type="file"
            id="files"
            accept="image/png"
            multiple
        >
    </label>

    <div class="mode-switch">

        <button
            class="mode-btn active"
            data-mode="silhouette">
            Silhouette
        </button>

        <button
            class="mode-btn"
            data-mode="pixel">
            Pixelate
        </button>

    </div>

    <div class="slider-group">

        <div class="slider-label">
            Pixel Size:
            <span id="detailValue">32</span>
        </div>

        <input
            type="range"
            id="detail"
            min="8"
            max="64"
            value="32"
            step="2"
        >

    </div>

    <div class="buttons">

        <button id="downloadAll">
            Download ZIP
        </button>

    </div>

    <div class="status" id="status">
        Waiting for PNGs...
    </div>

    <div id="gallery"></div>

</div>

<script src="script.js"></script>

</body>
</html>
