<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PNG to Vector Art</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>
</head>
<body>

    <h1>PNG → Vector Art</h1>

    <input type="file" id="file" accept="image/png">

    <label>
        Detail Level
        <input type="range" id="detail" min="2" max="32" value="8">
    </label>

    <div class="preview">
        <div class="box">
            <h2>Original</h2>
            <img id="original">
        </div>

        <div class="box">
            <h2>Vector</h2>
            <div id="result"></div>
        </div>
    </div>

    <button id="download">Download SVG</button>

    <script src="script.js"></script>

</body>
</html>
